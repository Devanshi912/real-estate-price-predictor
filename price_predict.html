{% extends 'base.html' %}

{% block content %}
<style>
  .predict-container {
    max-width: 960px;
    margin: 0 auto;
    padding: 40px;
    background-color: #f9f9f9;
    border-radius: 16px;
    box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
    font-family: 'Segoe UI', sans-serif;
  }

  h2 {
    text-align: center;
    color: #2d3436;
    margin-bottom: 35px;
    font-weight: 600;
  }

  label.form-label {
    font-weight: 500;
    color: #2d3436;
    margin-bottom: 6px;
    display: block;
  }

  .form-control,
  .form-select {
    border-radius: 10px;
    border: 1px solid #ccc;
    padding: 10px 14px;
    font-size: 0.95rem;
  }

  .form-control:focus,
  .form-select:focus {
    border-color: #1e90ff;
    box-shadow: 0 0 0 0.15rem rgba(30, 144, 255, 0.25);
  }

  .form-check-label {
    font-weight: 400;
    margin-left: 8px;
  }

  .form-check-input {
    transform: scale(1.1);
  }

  .btn-primary {
    background: linear-gradient(to right, #1e90ff, #007bff);
    border: none;
    padding: 12px 32px;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 600;
    transition: background 0.3s ease;
  }

  .btn-primary:hover {
    background: linear-gradient(to right, #007bff, #1e90ff);
  }

  .alert-success {
    font-size: 1.3rem;
    border-radius: 12px;
  }

  .mb-3 {
    margin-bottom: 20px;
  }

  @media (max-width: 768px) {
    .predict-container {
      padding: 20px;
    }
  }
</style>

<div class="predict-container">
  <h2>Real Estate Price Prediction</h2>

  <form method="post" class="needs-validation" novalidate>
    {% csrf_token %}

    <div class="row">
      <div class="col-md-6">
        <div class="mb-3">
          <label for="area" class="form-label">Area (sq ft)</label>
          <input type="number" class="form-control" id="area" name="area" required>
        </div>

        <div class="mb-3">
          <label for="bedrooms" class="form-label">Bedrooms</label>
          <select class="form-select" id="bedrooms" name="bedrooms" required>
            <option value="" selected disabled>Select number of bedrooms</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5+</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="bathrooms" class="form-label">Bathrooms</label>
          <select class="form-select" id="bathrooms" name="bathrooms" required>
            <option value="" selected disabled>Select number of bathrooms</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
          </select>
        </div>
      </div>

      <div class="col-md-6">
        <div class="mb-3">
          <label for="location" class="form-label">Location</label>
          <select class="form-select" id="location" name="location" required>
            <option value="" selected disabled>Select location</option>
            <option value="ahmedabad">Ahmedabad</option>
            <option value="surat">Surat</option>
            <option value="vadodara">Vadodara</option>
            <option value="rajkot">Rajkot</option>
            <option value="gandhinagar">Gandhinagar</option>
            <option value="bhavnagar">Bhavnagar</option>
            <option value="junagadh">Junagadh</option>
            <option value="anand">Anand</option>
            <option value="navsari">Navsari</option>
            <option value="mehsana">Mehsana</option>
             <option value="Jamnagar">Jamnagar</option>
              <option value="junagadh">Junagadh</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="property_type" class="form-label">Property Type</label>
          <select class="form-select" id="property_type" name="property_type" required>
            <option value="" selected disabled>Select property type</option>
            <option value="Apartment">Apartment</option>
            <option value="Bungalow">Bungalow</option>
            <option value="Row House">Row House</option>
            <option value="Penthouse">Penthouse</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="furnishing" class="form-label">Furnishing Status</label>
          <select class="form-select" id="furnishing" name="furnishing" required>
            <option value="" selected disabled>Select furnishing</option>
            <option value="Furnished">Furnished</option>
            <option value="Semi-Furnished">Semi-Furnished</option>
            <option value="Unfurnished">Unfurnished</option>
          </select>
        </div>

        <div class="mb-3">
          <label for="year_built" class="form-label">Year Built</label>
          <input type="number" class="form-control" id="year_built" name="year_built" min="1800" max="{% now 'Y' %}" required>
        </div>

        <div class="mb-3">
          <label class="form-label">Amenities</label>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="parking" name="amenities" value="parking">
            <label class="form-check-label" for="parking">Parking</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="garden" name="amenities" value="garden">
            <label class="form-check-label" for="garden">Garden</label>
          </div>
          <div class="form-check">
            <input class="form-check-input" type="checkbox" id="pool" name="amenities" value="pool">
            <label class="form-check-label" for="pool">Swimming Pool</label>
          </div>
        </div>
      </div>
    </div>

    <div class="text-center">
      <button type="submit" class="btn btn-primary mt-4">Predict Price</button>
    </div>
  </form>

  {% if predicted_price %}
    <div class="alert alert-success mt-4 text-center">
      <strong>Predicted Price:</strong> ₹{{ predicted_price|floatformat:0 }}
    </div>
  {% endif %}
</div>

<script>
  (function () {
    'use strict';
    var forms = document.querySelectorAll('.needs-validation');
    Array.prototype.slice.call(forms).forEach(function (form) {
      form.addEventListener('submit', function (event) {
        if (!form.checkValidity()) {
          event.preventDefault();
          event.stopPropagation();
        }
        form.classList.add('was-validated');
      }, false);
    });
  })();
</script>
{% endblock %}
